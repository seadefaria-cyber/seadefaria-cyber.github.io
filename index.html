<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
    <title>deFaria</title>
    <meta name="description" content="deFaria">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23000'/><text x='50%25' y='22' text-anchor='middle' font-family='Helvetica,sans-serif' font-size='14' fill='%23fff' font-weight='bold'>dF</text></svg>">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #fff;
            color: #0a0a0a;
            font-family: 'Inter', Helvetica, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        a { color: inherit; text-decoration: none; }

        /* Noise */
        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 6000;
            opacity: 0.03;
            mix-blend-mode: hard-light;
        }
        .noise canvas { width: 100%; height: 100%; display: block; }

        /* ======= NAV ======= */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 28px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.8px;
            color: #0a0a0a;
            opacity: 1;
            transition: opacity 1.4s ease;
        }
        .logo.faded {
            opacity: 0;
            pointer-events: none;
        }
        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
        }
        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: #0a0a0a;
            opacity: 0.65;
            transition: opacity 0.3s, color 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: #1d4ed8; }

        /* ======= SCROLL CUE ======= */
        .scroll-cue {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: #0a0a0a;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.6s ease, color 0.3s ease;
            z-index: 50;
        }
        .scroll-cue.visible { opacity: 1; }
        .scroll-cue:hover { color: #1d4ed8; }
        .scroll-cue .arrow {
            display: inline-block;
            font-size: 14px;
            animation: bob 1.8s ease-in-out infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        /* ======= HERO ======= */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .hero-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            transition: opacity 0.4s ease;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* No separate hover text — handled in canvas */

        /* Hidden text for accessibility */
        .hero h1 {
            position: absolute;
            color: transparent;
            font-size: 0;
        }

        .scanline { display: none; }


        /* ======= SERVICES ======= */
        .services {
            padding: 160px 80px 140px;
            background: #fff;
        }
        .services-inner {
            max-width: 1280px;
            margin: 0 auto;
        }
        .services-eyebrow {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #0a0a0a;
            opacity: 0.5;
            margin-bottom: 80px;
        }
        .services-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 48px;
            align-items: stretch;
        }
        .services-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .services-list li {
            line-height: 1;
        }
        .services-list h3 {
            font-family: 'Inter', Helvetica, sans-serif;
            font-weight: 900;
            font-size: clamp(54px, 11vw, 170px);
            letter-spacing: -5px;
            line-height: 0.92;
            color: #0a0a0a;
        }
        .services-list li.accent h3 {
            color: #1d4ed8;
        }
        .services-list h3.serif-moment {
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-weight: 600;
            font-size: clamp(62px, 11.8vw, 185px);
            letter-spacing: -3px;
            line-height: 0.9;
        }
        .services-list h3.serif-roman {
            font-family: 'Fraunces', Georgia, serif;
            font-style: normal;
            font-weight: 700;
            font-size: clamp(58px, 11vw, 170px);
            letter-spacing: -3.5px;
            line-height: 0.9;
        }
        .campaigns-label {
            position: relative;
            display: flex;
            align-items: stretch;
            gap: 28px;
            padding-left: 24px;
        }
        .campaigns-rule {
            width: 2px;
            background: #c9c9c9;
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 1.2s cubic-bezier(.77,0,.18,1);
        }
        .campaigns-word {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-weight: 600;
            font-size: clamp(52px, 9vw, 130px);
            letter-spacing: -1.5px;
            line-height: 1;
            align-self: center;
            color: #0a0a0a;
            opacity: 0;
            transition: opacity 1s ease 0.4s, letter-spacing 1s ease 0.4s;
        }
        .services.is-in .campaigns-rule { transform: scaleY(1); }
        .services.is-in .campaigns-word { opacity: 1; letter-spacing: 2px; }

        /* ======= SERVICE HOVER (morphing subtitle + inquire badge) ======= */
        .services-list li { position: relative; cursor: pointer; }
        .services-list li h3 { transition: color 0.3s ease, transform 0.4s cubic-bezier(.2,.7,.2,1); transform-origin: left center; }
        .services-list:hover h3 { color: #c9c9c9; }
        .services-list li:hover h3 { color: #1d4ed8; transform: translateX(0.35vw); }

        .services-subtitle {
            margin: 48px 0 0;
            max-width: 62ch;
            font-family: 'Inter', Helvetica, sans-serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(16px, 1.5vw, 22px);
            line-height: 1.35;
            letter-spacing: -0.2px;
            color: #1d4ed8;
            min-height: 2.8em;
        }
        .services-subtitle__text {
            display: inline-block;
            transition: transform 0.45s cubic-bezier(.2,.7,.2,1), opacity 0.3s ease;
            will-change: transform, opacity;
        }
        .services-subtitle__text.is-out { opacity: 0; transform: translateY(8px); }
        .services-subtitle__text.is-in  { opacity: 0; transform: translateY(-8px); }

        @media (max-width: 768px) {
            .services-subtitle { font-size: 15px; min-height: 3.6em; margin-top: 32px; }
            .services-list li:hover h3 { transform: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            .services-subtitle__text { transition: opacity 0.15s ease; transform: none !important; }
            .services-list li h3 { transition: color 0.2s ease; transform: none !important; }
        }

        @media (max-width: 768px) {
            .services { padding: 100px 24px 80px; }
            .services-eyebrow { margin-bottom: 48px; }
            .services-list { gap: 28px; }
            .services-list h3 { letter-spacing: -2.5px; }
            .services-grid { grid-template-columns: 1fr; gap: 32px; }
            .campaigns-label {
                flex-direction: row;
                align-items: center;
                justify-content: flex-start;
                padding: 16px 0 0;
                gap: 16px;
            }
            .campaigns-rule {
                width: 40%;
                height: 2px;
                transform: scaleX(0);
                transform-origin: left;
                transition: transform 1.1s cubic-bezier(.77,0,.18,1);
            }
            .services.is-in .campaigns-rule { transform: scaleX(1); }
            .campaigns-word {
                writing-mode: horizontal-tb;
                transform: none;
                font-size: clamp(28px, 9vw, 56px);
                letter-spacing: 1px;
            }
            .services.is-in .campaigns-word { letter-spacing: 2px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .campaigns-rule, .campaigns-word { transition: none; }
        }

        /* ======= CONTACT FORM ======= */
        .contact {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 120px 80px 140px;
            background: #fff;
        }
        .contact-inner {
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }
        .contact h2 {
            font-family: 'Inter', Helvetica, sans-serif;
            font-weight: 900;
            font-size: clamp(80px, 14vw, 240px);
            letter-spacing: -6px;
            line-height: 0.9;
            color: #0a0a0a;
            margin-bottom: 72px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 28px;
            width: 100%;
            max-width: 720px;
        }
        .form-field { display: flex; flex-direction: column; gap: 8px; }
        .form-field label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: #0a0a0a;
            opacity: 0.5;
        }
        .form input,
        .form textarea {
            background: transparent;
            border: none;
            border-bottom: 1px solid #0a0a0a;
            color: #0a0a0a;
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.3px;
            padding: 12px 0;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            border-radius: 0;
            width: 100%;
        }
        .form input:focus,
        .form textarea:focus {
            border-bottom-color: #1d4ed8;
            border-bottom-width: 2px;
            padding-bottom: 11px;
        }
        .form textarea {
            resize: none;
            height: 90px;
        }
        .form button {
            background: #0a0a0a;
            color: #fff;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 22px 36px;
            cursor: pointer;
            transition: background 0.25s;
            align-self: flex-start;
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
        }
        .form button .arrow { transition: transform 0.25s; display: inline-block; }
        .form button:hover { background: #1d4ed8; }
        .form button:hover .arrow { transform: translateX(6px); }

        @media (max-width: 768px) {
            .contact { padding: 80px 24px; }
            .contact h2 { letter-spacing: -3px; margin-bottom: 48px; }
        }

        /* ======= FOOTER ======= */
        footer {
            padding: 40px 48px;
            border-top: 1px solid #0a0a0a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: #0a0a0a;
            background: #fff;
        }
        footer a { color: #0a0a0a; transition: color 0.3s; }
        footer a:hover { color: #1d4ed8; }

        /* ======= RESPONSIVE ======= */
        @media (max-width: 768px) {
            nav { padding: 20px 20px; }
            .nav-links { display: none; }
            .contact h2 { letter-spacing: -3px; }
            .form { max-width: 100%; }
            footer { padding: 20px; flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="noise"><canvas id="noise"></canvas></div>
<div class="scanline"></div>


<nav>
    <a href="#services" class="logo">deFaria</a>
    <ul class="nav-links">
        <li><a href="#services">Digital Work</a></li>
        <li><a href="#contact">Let's Work</a></li>
    </ul>
</nav>

<!-- Hero — film reel plays inside the "deFaria" text -->
<section class="hero" id="hero">
    <canvas id="heroCanvas" class="hero-canvas"></canvas>
    <h1>deFaria</h1>
    <a href="#services" class="scroll-cue" id="scrollCue">
        <span class="arrow">↓</span>
        <span>Digital Work</span>
    </a>
</section>

<!-- Services -->
<section class="services" id="services">
    <div class="services-inner">
        <p class="services-eyebrow">Digital Work</p>
        <div class="services-grid">
            <ul class="services-list">
                <li data-desc="Coordinated creator campaigns that move your song through culture."><h3>SEEDING</h3></li>
                <li data-desc="Owned fanpages that introduce your artist to audiences already built."><h3 class="serif-moment">Fanpage</h3></li>
                <li data-desc="Press, podcasts, and brand partnerships that turn numbers into legitimacy."><h3 class="serif-roman">BRANDS &amp; MEDIA</h3></li>
            </ul>
            <aside class="campaigns-label" aria-hidden="true">
                <span class="campaigns-rule"></span>
                <span class="campaigns-word">CAMPAIGNS</span>
            </aside>
        </div>
        <p class="services-subtitle" aria-live="polite">
            <span class="services-subtitle__text">&nbsp;</span>
        </p>
    </div>
</section>

<!-- Contact -->
<section class="contact" id="contact">
    <div class="contact-inner">
        <h2>let's work.</h2>
        <form class="form" action="https://formsubmit.co/sean@defaria.nyc" method="POST">
            <input type="hidden" name="_subject" value="New inquiry from defaria.digital">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://defaria.digital/thanks.html">
            <div class="form-field">
                <label for="f-name">Name</label>
                <input id="f-name" type="text" name="name" required>
            </div>
            <div class="form-field">
                <label for="f-email">Email</label>
                <input id="f-email" type="email" name="email" required>
            </div>
            <div class="form-field">
                <label for="f-project">Project</label>
                <input id="f-project" type="text" name="project">
            </div>
            <div class="form-field">
                <label for="f-message">Tell us about it</label>
                <textarea id="f-message" name="message"></textarea>
            </div>
            <button type="submit">Send <span class="arrow">→</span></button>
        </form>
    </div>
</section>

<footer>
    <span>&copy; 2026 deFaria&trade; &nbsp;·&nbsp; All Rights Reserved</span>
    <a href="https://instagram.com/defaria" target="_blank">Instagram ↗</a>
</footer>

<script>
// ======= NOISE =======
const nc = document.getElementById('noise');
const nx = nc.getContext('2d');
function szN() { nc.width = window.innerWidth; nc.height = window.innerHeight; }
szN(); window.addEventListener('resize', szN);
let nf = 0;
function grain() {
    if (++nf % 3 !== 0) { requestAnimationFrame(grain); return; }
    const w = nc.width, h = nc.height;
    const img = nx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = 255;
    }
    nx.putImageData(img, 0, 0);
    requestAnimationFrame(grain);
}
grain();

// ======= FILM REEL INSIDE TEXT (Canvas) =======
const canvas = document.getElementById('heroCanvas');
const ctx = canvas.getContext('2d');

// VIDEO LOOPS — each plays as a looping clip inside the text
const videoSrcs = [
    // Spaced out — no two Chris Heyn clips back to back
    'vid/loop-sd-3.mp4',       // A$AP Rocky PUMA (LEAD)
    'vid/loop-sd-1.mp4',       // Urban Wyatt at 6:57
    'vid/loop-heyn-1.mp4',     // Heyn: IAN ep
    'vid/loop-ap-1.mp4',       // Asspizza: Lukas Sabbat
    'vid/loop-heyn-3.mp4',     // Heyn: THE HELLP ep
    'vid/loop-sd-2.mp4',       // Robin's Jean
    'vid/loop-heyn-5.mp4',     // Heyn: WISDOM KAYE ep
    'vid/loop-new-1.mp4',      // Ian - I Ain't Coming Back
    'vid/loop-heyn-7.mp4',     // Heyn: FENG ep
    'vid/loop-ap-2.mp4',       // Asspizza: SLAWN
    'vid/loop-heyn-2.mp4',     // Heyn: IAN ep pt2
    'vid/loop-new-2.mp4',      // Joy Talks
    'vid/loop-heyn-4.mp4',     // Heyn: THE HELLP pt2
    'vid/loop-ap-3.mp4',       // Asspizza: Ian highlight
    'vid/loop-heyn-6.mp4',     // Heyn: WISDOM KAYE pt2
    'vid/loop-new-3.mp4',      // SWEETCIAN
    'vid/loop-heyn-8.mp4',     // Heyn: FENG pt2
    'vid/loop-ap-4.mp4',       // Asspizza highlight
    'vid/loop-add-1.mp4',     // Tomorrows Gone Asspizza
    'vid/loop-mural.mp4',      // Mural stream
    'vid/loop-add-2.mp4',     // Gm2D-RYME5k
    'vid/loop-desktop.mp4',    // Desktop clip
    'vid/loop-add-3.mp4',     // W-h36CGqJ_w at 6:51 (5 sec)
];

const media = []; // array of {el, w, h} — works for both video and image elements
let mediaReady = 0;

videoSrcs.forEach(src => {
    const vid = document.createElement('video');
    vid.src = src;
    vid.loop = true;
    vid.muted = true;
    vid.playsInline = true;
    vid.autoplay = true;
    vid.style.display = 'none';
    document.body.appendChild(vid);
    vid.addEventListener('loadeddata', () => {
        mediaReady++;
        vid.play().catch(() => {});
        if (videoStartTime === 0) videoStartTime = performance.now();
    });
    media.push({ el: vid, get w() { return vid.videoWidth || 320; }, get h() { return vid.videoHeight || 180; } });
});

const TEXT = 'deFaria';
let scrollX = 0;
let SPEED = 1.2;
let isHovering = false;
let hoverOpacity = 0; // 0 = full video, 1 = full black text
let videoStartTime = 0;
const FADE_DELAY = 5000;       // ms before center text fades to black
const FADE_DURATION = 1400;    // ms for center fade duration
const LOGO_FADE_DELAY = 2500;  // ms before top-left nav logo fades out
let scrollCueShown = false;
let navLogoFaded = false;

document.getElementById('hero').addEventListener('mouseenter', () => { isHovering = true; });
document.getElementById('hero').addEventListener('mouseleave', () => { isHovering = false; });

function sizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const hero = document.getElementById('hero');
    const w = hero.clientWidth;
    const h = hero.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

// Intro animation state
const INTRO_DURATION = 2000; // 2 seconds
const introStart = performance.now();
let introDone = false;

// Click hero to scroll to contact
document.getElementById('hero').addEventListener('click', () => {
    document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
});

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function drawHero(now) {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);

    let fontSize = Math.min(280, Math.max(100, w * 0.18));

    ctx.save();

    // Small grid of videos tiled inside the text
    const cellH = fontSize * 0.52;
    const rows = Math.ceil((fontSize * 1.1) / cellH);
    const totalGridH = rows * cellH;
    const gridStartY = (h - totalGridH) / 2;

    if (mediaReady > 0) {
        for (let row = 0; row < rows; row++) {
            const rowY = gridStartY + row * cellH;
            let totalRowW = 0;
            for (const m of media) {
                if (m.w > 0) totalRowW += cellH * (m.w / m.h);
            }
            if (totalRowW <= 0) continue;

            const rowScroll = (scrollX + row * 120) % totalRowW;
            let drawX = -rowScroll;

            let safety = 0;
            while (drawX < w + 400 && safety < 100) {
                for (let i = 0; i < media.length; i++) {
                    if (media[i].w <= 0) continue;
                    const aspect = media[i].w / media[i].h;
                    const cellW = cellH * aspect;
                    try { ctx.drawImage(media[i].el, drawX, rowY, cellW, cellH); } catch(e) {}
                    drawX += cellW;
                    if (drawX > w + 400) break;
                }
                safety++;
            }
        }
    }

    // Scan lines overlay — inside the letters only
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let y = 0; y < h; y += 4) {
        ctx.fillRect(0, y, w, 1);
    }

    // Mask to text shape
    ctx.globalCompositeOperation = 'destination-in';
    ctx.font = `900 ${fontSize}px 'Inter', Helvetica, Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (ctx.letterSpacing !== undefined) ctx.letterSpacing = '-5px';
    ctx.fillStyle = '#fff';
    ctx.fillText(TEXT, w / 2, h / 2);
    ctx.globalCompositeOperation = 'source-over';

    ctx.restore();

    // Fade to solid black letters after 5s + sync UI transitions
    let blackOpacity = 0;
    if (videoStartTime > 0) {
        const elapsed = now - videoStartTime;

        // Show scroll cue shortly after videos start playing
        if (!scrollCueShown && elapsed > 900) {
            scrollCueShown = true;
            const cue = document.getElementById('scrollCue');
            if (cue) cue.classList.add('visible');
        }

        // Fade out the top-left nav logo after LOGO_FADE_DELAY
        if (!navLogoFaded && elapsed > LOGO_FADE_DELAY) {
            navLogoFaded = true;
            document.querySelector('.logo')?.classList.add('faded');
        }

        if (elapsed > FADE_DELAY) {
            blackOpacity = Math.min(1, (elapsed - FADE_DELAY) / FADE_DURATION);
            blackOpacity = easeOutCubic(blackOpacity);
        }
    }
    if (blackOpacity > 0) {
        ctx.save();
        ctx.font = `900 ${fontSize}px 'Inter', Helvetica, Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (ctx.letterSpacing !== undefined) ctx.letterSpacing = '-5px';
        ctx.fillStyle = `rgba(10, 10, 10, ${blackOpacity})`;
        ctx.fillText(TEXT, w / 2, h / 2);
        ctx.restore();
    }

    // Advance — constant speed
    scrollX += 0.6;


    requestAnimationFrame(drawHero);
}
requestAnimationFrame(drawHero);

// ======= SERVICES SCROLL REVEAL =======
const servicesSection = document.querySelector('.services');
if (servicesSection && 'IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                servicesSection.classList.add('is-in');
                obs.unobserve(servicesSection);
            }
        });
    }, { threshold: 0.35 });
    io.observe(servicesSection);
}

// ======= SERVICE HOVER (morphing subtitle + inquire badge) + CLICK TO CONTACT =======
(function() {
    const list = document.querySelector('.services-list');
    const items = document.querySelectorAll('.services-list li');
    const slot = document.querySelector('.services-subtitle__text');
    if (!list || !items.length || !slot) return;

    const DEFAULT = slot.textContent;
    let current = DEFAULT;
    let token = 0;

    function swap(next) {
        if (next === current) return;
        current = next;
        const id = ++token;
        slot.classList.add('is-out');
        const handler = () => {
            slot.removeEventListener('transitionend', handler);
            if (id !== token) return;
            slot.textContent = next;
            slot.classList.remove('is-out');
            slot.classList.add('is-in');
            requestAnimationFrame(() => requestAnimationFrame(() => slot.classList.remove('is-in')));
        };
        slot.addEventListener('transitionend', handler, { once: true });
    }

    items.forEach(li => {
        li.addEventListener('mouseenter', () => swap(li.dataset.desc || DEFAULT));
        li.addEventListener('click', () => {
            const c = document.getElementById('contact');
            if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });
    list.addEventListener('mouseleave', () => swap(DEFAULT));
})();

</script>
