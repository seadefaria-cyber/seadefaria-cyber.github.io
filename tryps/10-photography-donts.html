<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps Brand Book - Photography Don'ts</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #F7F5F2;
    position: relative;
  }

  .section-label {
    position: absolute;
    top: 44px;
    left: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #8C8279;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title-area {
    position: absolute;
    top: 90px;
    left: 60px;
    width: 1200px;
  }
  .title-area h1 {
    font-size: 52px;
    font-weight: 800;
    color: #3D3530;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .title-area p {
    font-size: 18px;
    font-weight: 400;
    color: #8C8279;
    line-height: 1.5;
    max-width: 900px;
  }

  .grid {
    position: absolute;
    top: 240px;
    left: 60px;
    right: 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 28px;
  }

  .photo-card {
    background: #FFFFFF;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid #f0eeeb;
    display: flex;
    flex-direction: column;
  }

  .photo-card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    display: block;
    filter: grayscale(100%) opacity(0.6);
  }

  .photo-label {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 28px;
  }

  .x-icon {
    width: 36px;
    height: 36px;
    background: rgba(217, 7, 28, 0.08);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .x-icon svg {
    width: 16px;
    height: 16px;
  }

  .photo-label span {
    font-size: 18px;
    font-weight: 600;
    color: #3D3530;
  }
</style>
</head>
<body>

<div class="section-label">10 PHOTOGRAPHY</div>
<img src="img/tryps-logo-red.png" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

<div class="title-area">
  <h1>Photography Don'ts</h1>
  <p>Avoid imagery that feels forced, generic, or disconnected.</p>
</div>

<div class="grid">
  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1557804506-669a67965ba0?w=640&h=420&fit=crop" alt="Staged corporate poses">
    <div class="photo-label">
      <div class="x-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#D9071C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
      <span>Staged corporate poses</span>
    </div>
  </div>

  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=640&h=420&fit=crop" alt="Generic stock photography">
    <div class="photo-label">
      <div class="x-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#D9071C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
      <span>Generic stock photography</span>
    </div>
  </div>

  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=640&h=420&fit=crop" alt="Cold sterile lighting">
    <div class="photo-label">
      <div class="x-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#D9071C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
      <span>Cold sterile lighting</span>
    </div>
  </div>

  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1500835556837-99ac94a94552?w=640&h=420&fit=crop" alt="Solo traveler focus">
    <div class="photo-label">
      <div class="x-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#D9071C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
      <span>Solo traveler focus</span>
    </div>
  </div>
</div>

</body>
</html>
