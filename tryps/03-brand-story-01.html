<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Brand Story 01</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #D9071C;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .section-label {
    position: absolute;
    top: 40px;
    left: 40px;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo {
    position: absolute;
    top: 40px;
    right: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #FFFFFF;
  }
  .center {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 120px;
  }
  .headline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 52px;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 32px;
    max-width: 1000px;
  }
  .body-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.8);
    text-align: center;
    line-height: 1.7;
    max-width: 800px;
  }
  .footer-label {
    position: absolute;
    bottom: 40px;
    left: 40px;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="section-label">01 Brand Story</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">
  <div class="center">
    <div class="headline">Everyone wants to go. Nobody wants to plan it.</div>
    <div class="body-text">Group trips die in the group chat. One person does all the work. Dates never line up. Plans get buried. The trip that everyone wanted never happens.</div>
  </div>
  <div class="footer-label">01 - BRAND STORY</div>
</body>
</html>
