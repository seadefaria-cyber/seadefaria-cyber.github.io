<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Word List</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FFFFFF; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.slide { width: 1920px; height: 1080px; overflow: hidden; position: relative; background: #FFFFFF; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; }
.logo { position: absolute; top: 40px; right: 40px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; color: #D9071C; z-index: 10; }
.section-label { position: absolute; top: 40px; left: 80px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; z-index: 10; }
.half { width: 960px; height: 1080px; display: flex; flex-direction: column; justify-content: center; padding: 80px 100px; }
.half-left { background: #3D3530; }
.half-right { background: #D9071C; }
.half-title { font-size: 48px; font-weight: 800; color: #FFFFFF; margin-bottom: 48px; }
.word-row { display: flex; align-items: center; gap: 20px; margin-bottom: 36px; }
.word-icon { font-family: 'Space Mono', monospace; font-size: 20px; flex-shrink: 0; width: 32px; text-align: center; }
.icon-check { color: #4ADE80; }
.icon-x { color: rgba(255,255,255,0.6); }
.word-text { font-size: 28px; font-weight: 700; color: #FFFFFF; letter-spacing: 0.5px; }
.word-divider { width: 100%; height: 1px; background: rgba(255,255,255,0.15); margin-bottom: 36px; }
</style>
</head>
<body>
<div class="slide">
  <div class="section-label">13 Voice & Tone</div>
  <img src="img/logo-white.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">
  <div class="half half-left">
    <div class="half-title">We Say</div>
    <div class="word-divider"></div>
    <div class="word-row">
      <span class="word-icon icon-check">&#10003;</span>
      <span class="word-text">adventure</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-check">&#10003;</span>
      <span class="word-text">crew</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-check">&#10003;</span>
      <span class="word-text">explore</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-check">&#10003;</span>
      <span class="word-text">discover</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-check">&#10003;</span>
      <span class="word-text">plan together</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-check">&#10003;</span>
      <span class="word-text">your trip</span>
    </div>
  </div>
  <div class="half half-right">
    <div class="half-title">We Don't Say</div>
    <div class="word-divider"></div>
    <div class="word-row">
      <span class="word-icon icon-x">&#10007;</span>
      <span class="word-text">vacation</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-x">&#10007;</span>
      <span class="word-text">group</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-x">&#10007;</span>
      <span class="word-text">travel</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-x">&#10007;</span>
      <span class="word-text">find</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-x">&#10007;</span>
      <span class="word-text">organize</span>
    </div>
    <div class="word-row">
      <span class="word-icon icon-x">&#10007;</span>
      <span class="word-text">the trip</span>
    </div>
  </div>
</div>
</body>
</html>
