<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Brand Values</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #F7F5F2;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
  }
  .section-label {
    position: absolute;
    top: 40px;
    left: 48px;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 12px;
    color: #8C8279;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo {
    position: absolute;
    top: 40px;
    right: 48px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #D9071C;
  }
  .header {
    position: absolute;
    top: 120px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 52px;
    color: #3D3530;
    margin-bottom: 16px;
  }
  .underline {
    width: 80px;
    height: 4px;
    background: #D9071C;
    border-radius: 2px;
    margin: 0 auto;
  }
  .grid {
    position: absolute;
    top: 280px;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    width: 1200px;
  }
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    border: 1px solid #f0eeeb;
    padding: 48px;
  }
  .card-number {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #D9071C;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #3D3530;
    margin-bottom: 12px;
  }
  .card-desc {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: #8C8279;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="section-label">03 Brand Values</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">
  <div class="header">
    <div class="title">Non-negotiables.</div>
    <div class="underline"></div>
  </div>
  <div class="grid">
    <div class="card">
      <div class="card-number">01</div>
      <div class="card-title">Obvious</div>
      <div class="card-desc">Open it. Get it. No instructions.</div>
    </div>
    <div class="card">
      <div class="card-number">02</div>
      <div class="card-title">Shareworthy</div>
      <div class="card-desc">Sending a Tryps link is relief. For both sides.</div>
    </div>
    <div class="card">
      <div class="card-number">03</div>
      <div class="card-title">Come Correct</div>
      <div class="card-desc">If Apple wouldn't put their name on it, neither would we.</div>
    </div>
    <div class="card">
      <div class="card-number">04</div>
      <div class="card-title">Clean</div>
      <div class="card-desc">If it's not worth screenshotting, it's not done.</div>
    </div>
  </div>
</body>
</html>
