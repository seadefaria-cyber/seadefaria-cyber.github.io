<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #FFFFFF;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
  }
  /* Subtle warm grain texture */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 1;
  }
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .logo-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 80px;
    color: #D9071C;
    letter-spacing: -1px;
    margin-bottom: 32px;
  }
  .divider {
    width: 80px;
    height: 4px;
    background: #D9071C;
    border-radius: 2px;
    margin-bottom: 32px;
  }
  .brand-book {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: #3D3530;
    letter-spacing: 10px;
    margin-bottom: 20px;
  }
  .tagline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 22px;
    color: #8C8279;
  }
  .footer {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: #C5C3C0;
    letter-spacing: 4px;
  }
</style>
</head>
<body>
  <div class="container">
    <img src="img/tryps-logo-red.png" style="height:80px;width:auto;">
    <div class="divider"></div>
    <div class="brand-book">BRAND BOOK</div>
    <div class="tagline">A Travel Agent for Your Group Chat.</div>
  </div>
  <div class="footer">2026 | CONFIDENTIAL</div>
</body>
</html>
