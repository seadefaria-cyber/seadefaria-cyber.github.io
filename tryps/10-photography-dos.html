<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps Brand Book - Photography Do's</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #F7F5F2;
    position: relative;
  }

  .section-label {
    position: absolute;
    top: 44px;
    left: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #8C8279;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title-area {
    position: absolute;
    top: 90px;
    left: 60px;
    width: 1200px;
  }
  .title-area h1 {
    font-size: 52px;
    font-weight: 800;
    color: #3D3530;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .title-area p {
    font-size: 18px;
    font-weight: 400;
    color: #8C8279;
    line-height: 1.5;
    max-width: 900px;
  }

  .grid {
    position: absolute;
    top: 240px;
    left: 60px;
    right: 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 28px;
  }

  .photo-card {
    background: #FFFFFF;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 1px solid #f0eeeb;
    display: flex;
    flex-direction: column;
  }

  .photo-card img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    display: block;
  }

  .photo-label {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 28px;
  }

  .check-icon {
    width: 36px;
    height: 36px;
    background: rgba(45, 143, 45, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check-icon svg {
    width: 18px;
    height: 18px;
  }

  .photo-label span {
    font-size: 18px;
    font-weight: 600;
    color: #3D3530;
  }
</style>
</head>
<body>

<div class="section-label">10 PHOTOGRAPHY</div>
<img src="img/tryps-logo-red.png" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

<div class="title-area">
  <h1>Photography Do's</h1>
  <p>Imagery should feel warm, authentic, and full of life.</p>
</div>

<div class="grid">
  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1539635278303-d4002c07eae3?w=640&h=420&fit=crop" alt="Real moments with friends">
    <div class="photo-label">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2D8F2D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span>Real moments with friends</span>
    </div>
  </div>

  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1527631746610-bca00a040d60?w=640&h=420&fit=crop" alt="Adventure over luxury">
    <div class="photo-label">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2D8F2D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span>Adventure over luxury</span>
    </div>
  </div>

  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1506929562872-bb421503ef21?w=640&h=420&fit=crop" alt="Warm golden light">
    <div class="photo-label">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2D8F2D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span>Warm golden light</span>
    </div>
  </div>

  <div class="photo-card">
    <img src="https://images.unsplash.com/photo-1523301343968-6a6ebf63c672?w=640&h=420&fit=crop" alt="Every background, every age">
    <div class="photo-label">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2D8F2D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span>Every background, every age</span>
    </div>
  </div>
</div>

</body>
</html>
