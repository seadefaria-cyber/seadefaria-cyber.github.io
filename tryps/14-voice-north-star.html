<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps Brand Book — Voice North Star</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #F7F5F2;
    position: relative;
  }

  .section-label {
    position: absolute;
    top: 44px;
    left: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #8C8279;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .logo {
    position: absolute;
    top: 40px;
    right: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #D9071C;
    letter-spacing: -0.5px;
  }

  .center-content {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 200px;
    text-align: center;
  }

  .quote-mark {
    font-family: Georgia, serif;
    font-size: 120px;
    color: #D9071C;
    line-height: 0.6;
    margin-bottom: 32px;
    opacity: 0.4;
  }

  .quote-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 32px;
    font-style: italic;
    font-weight: 500;
    color: #3D3530;
    line-height: 1.5;
    max-width: 1100px;
    margin-bottom: 48px;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: #D9071C;
    border-radius: 2px;
    margin-bottom: 40px;
  }

  .bottom-line {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #D9071C;
    line-height: 1.3;
  }
</style>
</head>
<body>

<div class="section-label">14 SOCIAL MEDIA</div>
<img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

<div class="center-content">
  <div class="quote-mark">"</div>
  <div class="quote-text">Every piece of Tryps copy should make the reader feel: 'This is not some tacky gimmicky service. This is the way everybody is planning their trip this summer.'</div>
  <div class="divider"></div>
  <div class="bottom-line">Legitimacy + inevitability.</div>
</div>

</body>
</html>
