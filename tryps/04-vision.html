<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Our Vision</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #D9071C;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
  }
  .section-label {
    position: absolute;
    top: 40px;
    left: 48px;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .logo {
    position: absolute;
    top: 40px;
    right: 48px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #FFFFFF;
  }
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .vision-label {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  .vision-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 48px;
    color: #FFFFFF;
    text-align: center;
    max-width: 900px;
    line-height: 1.3;
    margin-bottom: 32px;
  }
  .vision-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.8);
    text-align: center;
    max-width: 700px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="section-label">02 Mission and Vision</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">
  <div class="container">
    <div class="vision-label">OUR VISION</div>
    <div class="vision-text">The first and last app you open for every trip.</div>
    <div class="vision-sub">We're not building a tool. We're building the way people travel together.</div>
  </div>
</body>
</html>
