<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Visual Direction</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #F7F5F2;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 1;
  }
  .section-label {
    position: absolute;
    top: 40px;
    left: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #8C8279;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 2;
  }
  .logo {
    position: absolute;
    top: 40px;
    right: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #D9071C;
    z-index: 2;
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 110px 80px 60px;
  }
  .title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 52px;
    color: #3D3530;
    margin-bottom: 8px;
  }
  .subtitle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #8C8279;
    margin-bottom: 48px;
  }
  .cards {
    display: flex;
    gap: 28px;
    flex: 1;
  }
  .card {
    flex: 1;
    background: #F5EADB;
    border-radius: 16px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    min-height: 520px;
  }
  .card-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: #3D3530;
    margin-bottom: 12px;
  }
  .card-desc {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 17px;
    color: #8C8279;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="section-label">07 Visual Territory</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

  <div class="content">
    <div class="title">Visual Direction</div>
    <div class="subtitle">Warm. Saturated. Real. Never cold, never staged.</div>

    <div class="cards">
      <div class="card">
        <div class="card-title">Warm over cool</div>
        <div class="card-desc">Sun-drenched, golden light, film grain</div>
      </div>

      <div class="card">
        <div class="card-title">People over places</div>
        <div class="card-desc">The subject is always joy, not the destination</div>
      </div>

      <div class="card">
        <div class="card-title">Every age, every background</div>
        <div class="card-desc">Joy has no demographic</div>
      </div>
    </div>
  </div>
</body>
</html>
