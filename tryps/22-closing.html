<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Closing</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #D9071C; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

.slide {
  width: 1920px; height: 1080px; overflow: hidden;
  position: relative; background: #D9071C;
  font-family: 'Plus Jakarta Sans', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* Subtle radial glow */
.slide::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 900px;
  height: 900px;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.logo-img {
  height: 100px;
  width: auto;
  margin-bottom: 36px;
  position: relative;
  z-index: 1;
}

.tagline {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 28px;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  margin-bottom: 48px;
  letter-spacing: -0.3px;
  position: relative;
  z-index: 1;
}

.divider {
  width: 80px;
  height: 2px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin-bottom: 40px;
  position: relative;
  z-index: 1;
}

.url {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  font-weight: 400;
  color: rgba(255,255,255,0.65);
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
}

.footer {
  position: absolute;
  bottom: 48px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="slide">
  <img src="img/logo-white.png" class="logo-img" style="height:100px;width:auto;">
  <div class="tagline">A Travel Agent for Your Group Chat.</div>
  <div class="divider"></div>
  <div class="url">jointryps.com</div>
  <div class="footer">Brand Book v1.0 | 2026 | Confidential</div>
</div>
</body>
</html>
