<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Iconography</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.slide {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #F7F5F2;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.section-label {
  position: absolute;
  left: 60px;
  top: 48px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  color: #8C8279;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.content {
  position: absolute;
  left: 60px;
  top: 120px;
  right: 60px;
}

.title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 48px;
  font-weight: 800;
  color: #3D3530;
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.subtitle {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 18px;
  font-weight: 400;
  color: #8C8279;
  margin-bottom: 48px;
}

.grid-wrapper {
  display: flex;
  justify-content: center;
  width: 100%;
}

.icon-grid {
  display: grid;
  grid-template-columns: repeat(3, 180px);
  gap: 24px;
}

.icon-card {
  width: 180px;
  height: 180px;
  background: #FFFFFF;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border: 1px solid #f0eeeb;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
}

.icon-card svg {
  width: 48px;
  height: 48px;
  stroke: #3D3530;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

.icon-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: #8C8279;
}

.grid-note {
  text-align: center;
  margin-top: 36px;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 400;
  color: #8C8279;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="section-label">18 - ICONOGRAPHY</div>
  <img src="img/tryps-logo-red.png" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

  <div class="content">
    <div class="title">Iconography</div>
    <div class="subtitle">A consistent icon system built for clarity at every size.</div>

    <div class="grid-wrapper">
      <div>
        <div class="icon-grid">
          <!-- Search -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <div class="icon-name">Search</div>
          </div>

          <!-- Calendar -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <div class="icon-name">Calendar</div>
          </div>

          <!-- Map Pin -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div class="icon-name">Map Pin</div>
          </div>

          <!-- Users -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <div class="icon-name">Users</div>
          </div>

          <!-- Heart -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <div class="icon-name">Heart</div>
          </div>

          <!-- Plane -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
            <div class="icon-name">Plane</div>
          </div>

          <!-- Camera -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <div class="icon-name">Camera</div>
          </div>

          <!-- Settings -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <div class="icon-name">Settings</div>
          </div>

          <!-- Bell -->
          <div class="icon-card">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <div class="icon-name">Bell</div>
          </div>
        </div>

        <div class="grid-note">Lucide icons. 1.5px stroke. Rounded caps. 24px default size.</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
