<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>08 Brand Essence</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #F7F5F2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
  }

  .section-label {
    position: absolute; top: 40px; left: 60px;
    font-family: 'Space Mono', monospace;
    font-weight: 400; color: #8C8279; font-size: 12px;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .logo {
    position: absolute; top: 40px; right: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 28px; color: #D9071C;
  }

  .center-block {
    display: flex; flex-direction: column;
    align-items: center; max-width: 1200px;
  }

  .core-label {
    font-family: 'Space Mono', monospace;
    font-size: 14px; font-weight: 400; color: #D9071C;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 32px;
  }

  .headline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 80px; font-weight: 800; color: #D9071C;
    text-align: center; line-height: 1.08;
    margin-bottom: 48px;
  }

  .body-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 22px; font-weight: 400; color: #3D3530;
    text-align: center; max-width: 860px;
    line-height: 1.65;
  }
</style>
</head>
<body>
  <div class="section-label">08 BRAND ESSENCE</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

  <div class="center-block">
    <div class="core-label">THE CORE IDEA</div>
    <div class="headline">A Travel Agent for<br>Your Group Chat.</div>
    <div class="body-text">Martin from Tryps is a real travel agent that lives in your iMessage group chat. You add him like a friend. You text him where and when. He books everything. That's the whole product.</div>
  </div>
</body>
</html>
