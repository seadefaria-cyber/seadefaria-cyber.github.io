<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Dark Mode Palette</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

.slide {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #1E1B19;
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.logo {
  position: absolute;
  right: 40px;
  top: 36px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: #FFFFFF;
}

.section-label {
  position: absolute;
  left: 80px;
  top: 48px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: #8C8279;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.title {
  position: absolute;
  left: 80px;
  top: 100px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 64px;
  font-weight: 800;
  color: #F7F5F2;
}

.subtitle {
  position: absolute;
  left: 80px;
  top: 185px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: #B5ADA5;
  max-width: 800px;
}

.row {
  position: absolute;
  left: 80px;
  display: flex;
  flex-direction: column;
}

.row-1 { top: 260px; }
.row-2 { top: 660px; }

.row-label {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: #8C8279;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.cards {
  display: flex;
  flex-direction: row;
  gap: 24px;
}

.color-card {
  width: 570px;
  border-radius: 16px;
  overflow: hidden;
  background: #28241F;
}

.color-swatch {
  width: 570px;
  height: 200px;
}

.color-info {
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.color-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #F7F5F2;
}

.color-hex {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 400;
  color: #8C8279;
}
</style>
</head>
<body>
<div class="slide">
  <div class="section-label">COLOR SYSTEM</div>
  <div class="logo">tryps</div>
  <div class="title">Dark Mode Palette</div>
  <div class="subtitle">Adapted color system for dark surfaces, maintaining contrast and brand recognition.</div>

  <div class="row row-1">
    <div class="row-label">Surfaces</div>
    <div class="cards">
      <div class="color-card" style="border: 1px solid #3D3530;">
        <div class="color-swatch" style="background: #1E1B19;"></div>
        <div class="color-info">
          <div class="color-name">Warm Dark</div>
          <div class="color-hex">#1E1B19</div>
        </div>
      </div>
      <div class="color-card">
        <div class="color-swatch" style="background: #28241F;"></div>
        <div class="color-info">
          <div class="color-name">Card Surface</div>
          <div class="color-hex">#28241F</div>
        </div>
      </div>
      <div class="color-card">
        <div class="color-swatch" style="background: #E84040;"></div>
        <div class="color-info">
          <div class="color-name">Primary Dark</div>
          <div class="color-hex">#E84040</div>
        </div>
      </div>
    </div>
  </div>

  <div class="row row-2">
    <div class="row-label">Text &amp; Borders</div>
    <div class="cards">
      <div class="color-card">
        <div class="color-swatch" style="background: #F7F5F2;"></div>
        <div class="color-info">
          <div class="color-name">Text Primary</div>
          <div class="color-hex">#F7F5F2</div>
        </div>
      </div>
      <div class="color-card">
        <div class="color-swatch" style="background: #B5ADA5;"></div>
        <div class="color-info">
          <div class="color-name">Text Secondary</div>
          <div class="color-hex">#B5ADA5</div>
        </div>
      </div>
      <div class="color-card" style="border: 1px solid #3D3530;">
        <div class="color-swatch" style="background: #3D3530;"></div>
        <div class="color-info">
          <div class="color-name">Border</div>
          <div class="color-hex">#3D3530</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
