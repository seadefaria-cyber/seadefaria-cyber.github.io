<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Photography Rules</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #D9071C;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
  }
  .section-label {
    position: absolute;
    top: 40px;
    left: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 2;
  }
  .logo {
    position: absolute;
    top: 40px;
    right: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #fff;
    z-index: 2;
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 100px;
  }
  .title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 80px;
    color: #fff;
    margin-bottom: 64px;
    text-align: center;
  }
  .rules {
    display: flex;
    flex-direction: column;
    gap: 32px;
    max-width: 900px;
    width: 100%;
  }
  .rule {
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }
  .rule-number {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    flex-shrink: 0;
    padding-top: 2px;
  }
  .rule-text {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: #fff;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="section-label">08 Photography</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

  <div class="content">
    <div class="title">The Rules</div>

    <div class="rules">
      <div class="rule">
        <div class="rule-number">01</div>
        <div class="rule-text">Never posed. If it looks like a photoshoot, it's wrong.</div>
      </div>

      <div class="rule">
        <div class="rule-number">02</div>
        <div class="rule-text">Bold type overlay on every campaign image.</div>
      </div>

      <div class="rule">
        <div class="rule-number">03</div>
        <div class="rule-text">Diversity is not optional. Every shoot includes all ages, all backgrounds.</div>
      </div>

      <div class="rule">
        <div class="rule-number">04</div>
        <div class="rule-text">The subject is the feeling, not the location.</div>
      </div>
    </div>
  </div>
</body>
</html>
