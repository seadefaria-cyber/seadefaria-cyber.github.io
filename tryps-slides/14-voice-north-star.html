<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Voice North Star</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F7F5F2; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.slide { width: 1920px; height: 1080px; overflow: hidden; position: relative; background: #F7F5F2; font-family: 'Plus Jakarta Sans', sans-serif; }
.logo { position: absolute; top: 48px; right: 80px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800; color: #D9071C; }
.section-label { position: absolute; top: 48px; left: 80px; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 500; color: #8C8279; letter-spacing: 3px; text-transform: uppercase; }
.title { position: absolute; top: 90px; left: 80px; font-size: 64px; font-weight: 800; color: #3D3530; }
.subtitle { position: absolute; top: 170px; left: 80px; font-size: 18px; font-weight: 400; color: #8C8279; max-width: 1400px; line-height: 1.5; }
.quote-card { position: absolute; top: 220px; left: 80px; width: 1760px; height: 800px; background: #3D3530; border-radius: 20px; padding: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.open-quote { font-family: Georgia, serif; font-size: 160px; color: #D9071C; line-height: 0.8; margin-bottom: 20px; }
.quote-text { font-size: 48px; font-weight: 800; color: #FFFFFF; text-align: center; max-width: 1200px; line-height: 1.4; margin-bottom: 40px; }
.red-divider { width: 80px; height: 4px; background: #D9071C; border-radius: 2px; margin-bottom: 32px; }
.attribution { font-family: 'Space Mono', monospace; font-size: 15px; color: rgba(255,255,255,0.6); letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="slide">
  <div class="section-label">Voice North Star</div>
  <div class="logo">tryps</div>
  <div class="title">Voice North Star</div>
  <div class="subtitle">The guiding principle behind every word we write.</div>
  <div class="quote-card">
    <div class="open-quote">"</div>
    <div class="quote-text">We talk like your most organized friend who also happens to be the most fun.</div>
    <div class="red-divider"></div>
    <div class="attribution">tryps Brand Philosophy</div>
  </div>
</div>
</body>
</html>
