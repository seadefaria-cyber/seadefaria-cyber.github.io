<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Celebrity Analog</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #F7F5F2;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 1;
  }
  .section-label {
    position: absolute;
    top: 40px;
    left: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #8C8279;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 2;
  }
  .logo {
    position: absolute;
    top: 40px;
    right: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #D9071C;
    z-index: 2;
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 100px;
  }
  .human-form-label {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 400;
    color: #D9071C;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 64px;
    color: #D9071C;
    margin-bottom: 40px;
    text-align: center;
  }
  .description {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #3D3530;
    line-height: 1.7;
    text-align: center;
    max-width: 700px;
  }
</style>
</head>
<body>
  <div class="section-label">04 Brand Personality</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

  <div class="content">
    <div class="human-form-label">Tryps in Human Form</div>
    <div class="name">Anthony Bourdain</div>
    <div class="description">Traveled everywhere. Genuinely curious. Warm. No pretense. Loved connection over luxury. Made you want to go places not because they were fancy, but because the people were interesting.</div>
  </div>
</body>
</html>
