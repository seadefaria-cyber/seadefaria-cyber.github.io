<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Tryps - Positioning</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #F7F5F2;
    font-family: 'Plus Jakarta Sans', sans-serif;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 1;
  }
  .section-label {
    position: absolute;
    top: 40px;
    left: 60px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #8C8279;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 2;
  }
  .logo {
    position: absolute;
    top: 40px;
    right: 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #D9071C;
    z-index: 2;
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 160px 100px;
  }
  .positioning-label {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 400;
    color: #D9071C;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  .main-statement {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 36px;
    color: #3D3530;
    text-align: center;
    line-height: 1.5;
    max-width: 900px;
    margin-bottom: 12px;
  }
  .main-statement .red {
    color: #D9071C;
  }
  .unlike {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #8C8279;
    text-align: center;
    line-height: 1.7;
    max-width: 700px;
    margin-bottom: 80px;
  }
  .spectrum {
    width: 100%;
    max-width: 1000px;
    position: relative;
  }
  .spectrum-bar {
    width: 100%;
    height: 4px;
    background: #E0DBD5;
    border-radius: 2px;
    position: relative;
  }
  .spectrum-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    background: #D9071C;
    border-radius: 50%;
    box-shadow: 0 0 0 6px rgba(217, 7, 28, 0.15);
  }
  .spectrum-dot-label {
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #D9071C;
    white-space: nowrap;
  }
  .spectrum-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
  }
  .spectrum-end {
    text-align: center;
  }
  .spectrum-end-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    color: #8C8279;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .spectrum-end-names {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    color: #3D3530;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="section-label">05 Our Audience</div>
  <img src="img/tryps-logo-red.png" class="logo" style="position:absolute;top:40px;right:40px;height:36px;width:auto;">

  <div class="content">
    <div class="positioning-label">Positioning</div>
    <div class="main-statement">
      For the post-grad who just wants to see her friends back home,<br>
      <span class="red">Tryps is the way she gets to see them all.</span>
    </div>
    <div class="unlike">Unlike Expedia or Kayak, which aren't social.<br>Unlike the group chat, where plans go to die.</div>

    <div class="spectrum">
      <div class="spectrum-bar">
        <div class="spectrum-dot">
          <div class="spectrum-dot-label">Tryps</div>
        </div>
      </div>
      <div class="spectrum-labels">
        <div class="spectrum-end">
          <div class="spectrum-end-title">Not Social</div>
          <div class="spectrum-end-names">Expedia, Kayak</div>
        </div>
        <div class="spectrum-end">
          <div class="spectrum-end-title">Social but No Action</div>
          <div class="spectrum-end-names">iMessage, WhatsApp</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
